name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build json_builder
        working-directory: json_builder
        run: |
          npm ci
          npm run build

      - name: Build list_creator
        working-directory: list_creator
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/json_builder _site/list_creator
          cp index.html _site/
          cp -r json_builder/dist/* _site/json_builder/
          cp -r list_creator/dist/* _site/list_creator/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
