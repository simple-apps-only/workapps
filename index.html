<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work Apps</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1c2128;
        color: #e6edf3;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container { max-width: 600px; width: 100%; padding: 2rem; }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; color: #adbac7; }
      .cards { display: flex; flex-direction: column; gap: 1rem; }
      a.card {
        display: block;
        padding: 1.25rem 1.5rem;
        background: #2d333b;
        border: 1px solid #444c56;
        border-radius: 8px;
        color: #e6edf3;
        text-decoration: none;
        transition: border-color 0.15s, background 0.15s;
      }
      a.card:hover { border-color: #539bf5; background: #323942; }
      .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
      .card-desc { font-size: 0.875rem; color: #768390; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Work Apps</h1>
      <div class="cards">
        <a class="card" href="json_builder/">
          <div class="card-title">CSV JSON Builder</div>
          <div class="card-desc">Build JSON from CSV data</div>
        </a>
        <a class="card" href="list_creator/">
          <div class="card-title">CSV List Converter</div>
          <div class="card-desc">Convert CSV data into formatted lists</div>
        </a>
      </div>
    </div>
  </body>
</html>
